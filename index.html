<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal premium launchpad dashboard for tracking, budgeting, project management, and developer shortcuts.">
  <meta name="author" content="Thomas Robb">
  <title>Personal Launchpad</title>

  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- FontAwesome Free Icons CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Premium Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-midnight-nebula">

  <!-- macOS Top Menu Bar -->
  <div class="macos-menu-bar">
    <div class="menu-left">
      <i class="fa-brands fa-apple"></i>
      <span class="workspace-label">Thomas's Workspace</span>
      <button id="edit-mode-btn" class="menu-btn">
        <i class="fa-solid fa-sliders"></i> Edit Workspace
      </button>
    </div>
    <div class="menu-right">
      <span id="menu-time"></span>
      <span id="menu-date"></span>
      <button id="quick-settings-btn" class="menu-btn" aria-label="Quick Settings">
        <i class="fa-solid fa-sliders"></i>
      </button>
    </div>
  </div>

  <!-- Animated Glassmorphic Background Blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="dashboard-container">
    <!-- Header Welcome Bar -->
    <header class="dashboard-header">
      <div class="greeting-container">
        <h1 id="greeting">Welcome back</h1>
        <p class="subtitle">Your personal workspace and applications launchpad.</p>
      </div>
    </header>

    <!-- Main Grid Layout -->
    <main class="dashboard-layout">
      
      <!-- Main Content (App Cards) -->
      <section class="main-content">
        <!-- Search bar with glassmorphic design -->
        <div class="search-container">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input type="text" id="search-input" placeholder="Search applications or descriptions..." autocomplete="off">
        </div>

        <!-- Applications Grid -->
        <div class="app-grid" id="app-grid"></div>

        <!-- Search Empty State -->
        <div id="no-results" class="no-results-card">
          <i class="fa-solid fa-circle-question"></i>
          <h4>No applications found</h4>
          <p>We couldn't find anything matching your search term. Try checking for typos or clear your filter.</p>
        </div>
      </section>

      <!-- Sidebar Utilities -->
      <aside class="sidebar">
        
        <!-- Digital Clock Widget -->
        <article class="widget-card clock-card">
          <div class="clock-time">
            <span id="clock-hours">00</span>:<span id="clock-minutes">00</span><span id="clock-seconds" class="clock-seconds">00</span>
          </div>
          <div id="clock-date" class="clock-date">Loading date...</div>
        </article>

        <!-- Notepad Auto-Save Widget -->
        <article class="widget-card notepad-card">
          <div class="widget-header">
            <h2 class="widget-title"><i class="fa-solid fa-note-sticky"></i> Notepad</h2>
            <div id="notepad-status" class="widget-status"><i class="fa-solid fa-circle-check"></i> Saved</div>
          </div>
          <textarea id="notepad-textarea" placeholder="Type notes here... Saves automatically to local browser storage." aria-label="Notepad notes"></textarea>
        </article>

        <!-- Background Theme Picker Widget -->
        <article class="widget-card theme-card">
          <div class="widget-header">
            <h2 class="widget-title"><i class="fa-solid fa-palette"></i> Workspace Style</h2>
          </div>
          <div class="theme-options">
            <button class="theme-btn" data-theme="theme-midnight-nebula" style="background: linear-gradient(135deg, #4f46e5, #db2777);" title="Midnight Nebula" aria-label="Select Midnight Nebula theme"></button>
            <button class="theme-btn" data-theme="theme-aurora-borealis" style="background: linear-gradient(135deg, #059669, #0891b2);" title="Aurora Borealis" aria-label="Select Aurora Borealis theme"></button>
            <button class="theme-btn" data-theme="theme-solar-eclipse" style="background: linear-gradient(135deg, #d97706, #dc2626);" title="Solar Eclipse" aria-label="Select Solar Eclipse theme"></button>
            <button class="theme-btn" data-theme="theme-cyberpunk" style="background: linear-gradient(135deg, #ff007f, #7000ff);" title="Cyberpunk" aria-label="Select Cyberpunk theme"></button>
          </div>
        </article>

      </aside>

    </main>
  </div>

  <!-- macOS Floating Dock Container -->
  <div class="dock-container" role="navigation" aria-label="App Dock">
    <div class="dock" id="dock-container"></div>
  </div>

  <!-- Customization Editor Modal (Hidden by Default) -->
  <div id="editor-modal" class="modal-overlay" style="display: none;">
    <div class="modal-container">
      <h3 id="modal-title">Edit Application</h3>
      <form id="editor-form" onsubmit="event.preventDefault();">
        <div class="form-group">
          <label for="modal-app-title">App Title</label>
          <input type="text" id="modal-app-title" placeholder="e.g. My Application" required>
        </div>
        <div class="form-group">
          <label for="modal-app-desc">App Description</label>
          <input type="text" id="modal-app-desc" placeholder="e.g. Live tracking and analytics dashboard" required>
        </div>
        <div class="form-group">
          <label for="modal-app-url">App URL</label>
          <input type="url" id="modal-app-url" placeholder="https://example.com" required>
        </div>
        <div class="form-group color-selector-wrapper">
          <label for="modal-app-color">Accent Color</label>
          <input type="color" id="modal-app-color" class="color-dot-input" value="#a855f7">
        </div>
        <div class="form-group">
          <label for="modal-app-icon">Icon Glyph</label>
          <select id="modal-app-icon">
            <option value="fa-film">Film (fa-film)</option>
            <option value="fa-chart-line">Chart (fa-chart-line)</option>
            <option value="fa-atom">Atom (fa-atom)</option>
            <option value="fa-skull">Skull (fa-skull)</option>
            <option value="fa-bolt-lightning">Bolt (fa-bolt-lightning)</option>
            <option value="fa-pen-nib">Pen (fa-pen-nib)</option>
            <option value="fa-code">Code (fa-code)</option>
            <option value="fa-globe">Globe (fa-globe)</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" id="modal-cancel-btn" class="btn-macos btn-macos-secondary">Cancel</button>
          <button type="submit" id="modal-save-btn" class="btn-macos btn-macos-primary">Save App</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Interactive Dashboard Functionality Script -->
  <script src="app.js"></script>
</body>
</html>
