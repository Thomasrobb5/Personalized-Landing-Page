<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal premium launchpad dashboard for tracking, budgeting, project management, and developer shortcuts.">
  <meta name="author" content="Thomas Robb">
  <title>Personal Launchpad</title>

  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- FontAwesome Free Icons CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Premium Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-midnight-nebula">

  <!-- macOS Top Menu Bar -->
  <div class="mac-menu-bar">
    <div class="mac-menu-left">
      <i class="fa-brands fa-apple mac-menu-item apple-logo"></i>
      <span class="workspace-label mac-menu-item active-app">Thomas's Workspace</span>
      <button id="edit-mode-btn" class="mac-menu-item" style="background: none; border: none; color: inherit; font: inherit; padding: 0; cursor: pointer; display: flex; align-items: center; gap: 6px;">
        <i class="fa-solid fa-sliders"></i> Edit Workspace
      </button>
      <button id="workspace-settings-btn" class="mac-menu-item" style="background: none; border: none; color: inherit; font: inherit; padding: 0; cursor: pointer; display: flex; align-items: center; gap: 6px;"><i class="fa-solid fa-gear"></i> Settings</button>
    </div>
    <div class="mac-menu-right">
      <span id="menu-time" class="mac-menu-item"></span>
      <span id="menu-date" class="mac-menu-item"></span>
    </div>
  </div>

  <!-- Animated Glassmorphic Background Blobs -->
  <div class="bg-blobs" id="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Dynamic Background Pattern Overlay -->
  <div id="bg-pattern-overlay" class="bg-pattern-overlay"></div>

  <div class="dashboard-container">
    <!-- Header Welcome Bar -->
    <header class="dashboard-header">
      <div class="greeting-container">
        <h1 id="greeting">Welcome back</h1>
        <p class="subtitle">Your personal workspace and applications launchpad.</p>
      </div>
    </header>

    <!-- Main Grid Layout -->
    <main class="dashboard-layout">
      
      <!-- Main Content (App Cards) -->
      <section class="main-content">
        <!-- Search bar with glassmorphic design -->
        <div class="search-container">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input type="text" id="search-input" placeholder="Search applications or descriptions..." autocomplete="off">
        </div>

        <!-- Applications Grid -->
        <div class="app-grid" id="app-grid"></div>

        <!-- Search Empty State -->
        <div id="no-results" class="no-results-card">
          <i class="fa-solid fa-circle-question"></i>
          <h4>No applications found</h4>
          <p>We couldn't find anything matching your search term. Try checking for typos or clear your filter.</p>
        </div>
      </section>

      <!-- Sidebar Utilities -->
      <aside class="sidebar" id="sidebar-container">
        <div id="sidebar-widgets" class="sidebar-widgets-grid" style="display: grid; grid-template-columns: repeat(var(--sidebar-cols, 1), 1fr); gap: 24px; width: 100%;"></div>
        <button id="add-widget-btn" class="app-card add-card" style="display: none; min-height: 80px; padding: 20px; border-radius: 20px; flex-direction: row; gap: 10px; align-items: center; justify-content: center; width: 100%;">
          <div class="add-card-icon" style="width: 32px; height: 32px; font-size: 1rem; border-radius: 8px;">
            <i class="fa-solid fa-plus"></i>
          </div>
          <span class="add-card-title" style="font-size: 0.95rem;">Add Widget</span>
        </button>
      </aside>

    </main>
  </div>

  <!-- macOS Floating Dock Container -->
  <div class="dock-container" role="navigation" aria-label="App Dock">
    <div class="dock" id="dock-container"></div>
  </div>

  <!-- Customization Editor Modal (Hidden by Default) -->
  <div id="editor-modal" class="modal-overlay" style="display: none;">
    <div class="modal-container">
      <div class="modal-header">
        <h3 id="modal-title">Edit Application</h3>
        <button type="button" class="modal-close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="editor-form" onsubmit="event.preventDefault();">
        <div class="form-group">
          <label for="modal-app-title">App Title</label>
          <input type="text" id="modal-app-title" placeholder="e.g. My Application" required>
        </div>
        <div class="form-group">
          <label for="modal-app-desc">App Description</label>
          <input type="text" id="modal-app-desc" placeholder="e.g. Live tracking and analytics dashboard" required>
        </div>
        <div class="form-group">
          <label for="modal-app-url">App URL</label>
          <input type="url" id="modal-app-url" placeholder="https://example.com" required>
        </div>
        <div class="color-selector-wrapper">
          <label for="modal-app-color">Accent Color</label>
          <input type="color" id="modal-app-color" class="color-dot-input" value="#a855f7">
        </div>
        <div class="form-row-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px;">
          <div class="form-group">
            <label for="modal-app-colspan">Width (Cols)</label>
            <select id="modal-app-colspan">
              <option value="1">1 Column</option>
              <option value="2">2 Columns</option>
              <option value="3">3 Columns</option>
              <option value="4">4 Columns</option>
            </select>
          </div>
          <div class="form-group">
            <label for="modal-app-rowspan">Height (Rows)</label>
            <select id="modal-app-rowspan">
              <option value="1">1 Row</option>
              <option value="2">2 Rows</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="modal-app-size">Card Sizing Style</label>
          <select id="modal-app-size">
            <option value="default">Use Global Setting</option>
            <option value="compact">Compact</option>
            <option value="balanced">Balanced</option>
            <option value="expanded">Expanded</option>
          </select>
        </div>
        <div class="form-group">
          <label for="modal-app-icon">Icon Glyph</label>
          <select id="modal-app-icon">
            <option value="fa-film">Film (fa-film)</option>
            <option value="fa-chart-line">Chart (fa-chart-line)</option>
            <option value="fa-atom">Atom (fa-atom)</option>
            <option value="fa-skull">Skull (fa-skull)</option>
            <option value="fa-bolt-lightning">Bolt (fa-bolt-lightning)</option>
            <option value="fa-pen-nib">Pen (fa-pen-nib)</option>
            <option value="fa-code">Code (fa-code)</option>
            <option value="fa-globe">Globe (fa-globe)</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" id="modal-cancel-btn" class="btn-macos btn-macos-secondary">Cancel</button>
          <button type="submit" id="modal-save-btn" class="btn-macos btn-macos-primary">Save App</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Workspace Settings Modal (Hidden by Default) -->
  <div id="settings-modal" class="modal-overlay" style="display: none;">
    <div class="modal-container">
      <div class="modal-header">
        <h3>Workspace Settings</h3>
        <button type="button" class="modal-close-btn" id="settings-close-btn"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="settings-form" onsubmit="event.preventDefault();">
        <div class="form-group">
          <label for="settings-grid-cols">Grid Columns</label>
          <select id="settings-grid-cols">
            <option value="auto">Auto-fit</option>
            <option value="2">2 Columns</option>
            <option value="3">3 Columns</option>
            <option value="4">4 Columns</option>
          </select>
        </div>
        <div class="form-group">
          <label for="settings-card-size">Card Sizing</label>
          <select id="settings-card-size">
            <option value="compact">Compact</option>
            <option value="balanced">Balanced</option>
            <option value="expanded">Expanded</option>
          </select>
        </div>
        <div class="form-group">
          <label for="settings-card-gap">Card Spacing (Gap)</label>
          <select id="settings-card-gap">
            <option value="tight">Tight</option>
            <option value="comfortable">Comfortable</option>
            <option value="spacious">Spacious</option>
          </select>
        </div>
        <div class="form-row-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group">
            <label for="settings-bg-pattern">Background Pattern</label>
            <select id="settings-bg-pattern">
              <option value="none">Clean Glass</option>
              <option value="dots">Dotted Matrix</option>
              <option value="grid">Cyber Grid Lines</option>
              <option value="stripes">Diagonal Stripes</option>
            </select>
          </div>
          <div class="form-group" style="justify-content: center; display: flex; flex-direction: column;">
            <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; margin-top: 18px;">
              <input type="checkbox" id="settings-toggle-blobs" checked> Glow Blobs
            </label>
          </div>
        </div>
        <div class="form-row-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group">
            <label for="settings-sidebar-pos">Sidebar Position</label>
            <select id="settings-sidebar-pos">
              <option value="right">Sidebar Right</option>
              <option value="left">Sidebar Left</option>
              <option value="top">Widgets Top</option>
              <option value="hidden">Hidden</option>
            </select>
          </div>
          <div class="form-group">
            <label for="settings-sidebar-cols">Sidebar Columns</label>
            <select id="settings-sidebar-cols">
              <option value="1">1 Column</option>
              <option value="2">2 Columns</option>
            </select>
          </div>
        </div>
        
        <div class="form-group">
          <label>Widget Visibility</label>
          <div class="checkbox-group" style="display: flex; flex-direction: column; gap: 8px; margin-top: 6px;">
            <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer;">
              <input type="checkbox" id="settings-toggle-clock" checked> Clock Widget
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer;">
              <input type="checkbox" id="settings-toggle-notepad" checked> Notepad Widget
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer;">
              <input type="checkbox" id="settings-toggle-weather" checked> Weather Widget
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer;">
              <input type="checkbox" id="settings-toggle-resources" checked> Resource Monitor Widget
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer;">
              <input type="checkbox" id="settings-toggle-bookmarks" checked> Bookmarks Widget
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="settings-weather-city">Weather City</label>
          <input type="text" id="settings-weather-city" placeholder="e.g. New York">
        </div>

        <div class="form-group">
          <label for="settings-weather-state">Weather Condition</label>
          <select id="settings-weather-state">
            <option value="Sunny">Sunny</option>
            <option value="Cloudy">Cloudy</option>
            <option value="Rainy">Rainy</option>
            <option value="Stormy">Stormy</option>
          </select>
        </div>

        <div class="modal-actions">
          <button type="button" id="settings-cancel-btn" class="btn-macos btn-macos-secondary">Cancel</button>
          <button type="submit" id="settings-save-btn" class="btn-macos btn-macos-primary">Save Settings</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add/Edit Widget Modal (Hidden by Default) -->
  <div id="widget-modal" class="modal-overlay" style="display: none;">
    <div class="modal-container">
      <div class="modal-header">
        <h3 id="widget-modal-title">Add Widget</h3>
        <button type="button" class="modal-close-btn" id="widget-modal-close-btn"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="widget-form" onsubmit="event.preventDefault();">
        <div class="form-group" id="widget-type-select-group">
          <label for="widget-type">Widget Type</label>
          <select id="widget-type">
            <option value="clock">Digital Clock</option>
            <option value="notepad">Notepad Notes</option>
            <option value="theme">Workspace Style Theme Picker</option>
            <option value="weather">Weather Forecast</option>
            <option value="resources">System Resources Monitor</option>
            <option value="bookmarks">Quick Bookmarks</option>
            <option value="todo">To-Do Checklist</option>
            <option value="countdown">Countdown Timer</option>
            <option value="iframe">Iframe Embed Screen</option>
            <option value="calculator">Calculator</option>
          </select>
        </div>

        <div class="form-group">
          <label for="widget-title-input">Widget Title</label>
          <input type="text" id="widget-title-input" placeholder="e.g. Notes, Project Countdown" required>
        </div>

        <div class="form-group">
          <label for="widget-col-span">Width Span</label>
          <select id="widget-col-span">
            <option value="1">1 Column (Normal)</option>
            <option value="2">2 Columns (Wide)</option>
          </select>
        </div>

        <!-- Dynamic inputs shown based on selected widget type -->
        <div id="widget-config-fields">
          <!-- Weather Config -->
          <div class="widget-type-fields field-weather" style="display: none;">
            <div class="form-group">
              <label for="widget-weather-city">City</label>
              <input type="text" id="widget-weather-city" placeholder="e.g. London">
            </div>
            <div class="form-group">
              <label for="widget-weather-state">Default Condition</label>
              <select id="widget-weather-state">
                <option value="sunny">Sunny</option>
                <option value="cloudy">Cloudy</option>
                <option value="rainy">Rainy</option>
                <option value="snowy">Snowy</option>
              </select>
            </div>
          </div>

          <!-- Countdown Config -->
          <div class="widget-type-fields field-countdown" style="display: none;">
            <div class="form-group">
              <label for="widget-countdown-date">Target Date & Time</label>
              <input type="datetime-local" id="widget-countdown-date">
            </div>
          </div>

          <!-- Iframe Config -->
          <div class="widget-type-fields field-iframe" style="display: none;">
            <div class="form-group">
              <label for="widget-iframe-url">Embed URL</label>
              <input type="url" id="widget-iframe-url" placeholder="https://example.com/widget">
            </div>
            <div class="form-group">
              <label for="widget-iframe-height">Widget Height (px)</label>
              <input type="number" id="widget-iframe-height" placeholder="200" min="100" max="800" value="200">
            </div>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" id="widget-cancel-btn" class="btn-macos btn-macos-secondary">Cancel</button>
          <button type="submit" id="widget-save-btn" class="btn-macos btn-macos-primary">Save Widget</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Interactive Dashboard Functionality Script -->
  <script src="app.js"></script>
</body>
</html>
